<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-label="Network topology: firefighter units (node plus phone, paired over BLE) inside the structure connect over Wi-Fi or a scene mesh to a command-post PC, which connects to the cloud over an opportunistic uplink."><style>text{font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif}.t{font-size:14px;fill:#15181d}.ts{font-size:12px;fill:#5b6470}.th{font-size:14px;font-weight:600;fill:#15181d}</style><rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
        <defs>
          <marker id="ar3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#5b6470" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
        </defs>
        <!-- structure container -->
        <rect x="40" y="60" width="262" height="250" rx="12" fill="#f5f7f9" stroke="#8a94a0" stroke-width="1" stroke-dasharray="6 4"/>
        <text class="ts" x="60" y="84" text-anchor="start">Inside structure — no infrastructure</text>
        <rect x="60" y="104" width="222" height="64" rx="8" fill="#e3f3ee" stroke="#0f7a5f" stroke-width="1"/>
        <text class="th" x="171" y="126" text-anchor="middle" dominant-baseline="central">Firefighter unit 1</text>
        <text class="ts" x="171" y="144" text-anchor="middle" dominant-baseline="central">UNO Q + phone · paired BLE</text>
        <rect x="60" y="206" width="222" height="64" rx="8" fill="#e3f3ee" stroke="#0f7a5f" stroke-width="1"/>
        <text class="th" x="171" y="228" text-anchor="middle" dominant-baseline="central">Firefighter unit 2</text>
        <text class="ts" x="171" y="246" text-anchor="middle" dominant-baseline="central">UNO Q + phone · paired BLE</text>
        <!-- links to PC -->
        <line x1="282" y1="136" x2="378" y2="166" stroke="#5b6470" stroke-width="1.4" marker-start="url(#ar3)" marker-end="url(#ar3)"/>
        <line x1="282" y1="238" x2="378" y2="200" stroke="#5b6470" stroke-width="1.4" marker-start="url(#ar3)" marker-end="url(#ar3)"/>
        <text class="ts" x="320" y="186" text-anchor="middle">Wi-Fi mesh · 2-way</text>
        <!-- PC -->
        <rect x="382" y="150" width="180" height="64" rx="10" fill="#e3f3ee" stroke="#0f7a5f" stroke-width="1"/>
        <text class="th" x="472" y="172" text-anchor="middle" dominant-baseline="central">Command post</text>
        <text class="ts" x="472" y="190" text-anchor="middle" dominant-baseline="central">Copilot+ PC · X2 Elite</text>
        <!-- PC to cloud -->
        <line x1="472" y1="214" x2="472" y2="298" stroke="#5b6470" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#ar3)"/>
        <text class="ts" x="482" y="256" text-anchor="start">uplink · cellular / sat</text>
        <!-- cloud -->
        <rect x="382" y="300" width="180" height="56" rx="10" fill="#f1f3f6" stroke="#8a94a0" stroke-width="1" stroke-dasharray="6 4"/>
        <text class="th" x="472" y="320" text-anchor="middle" dominant-baseline="central">Cloud AI 100</text>
        <text class="ts" x="472" y="338" text-anchor="middle" dominant-baseline="central">opportunistic</text>
      </svg>
