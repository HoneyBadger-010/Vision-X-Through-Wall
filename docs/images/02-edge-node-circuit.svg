<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" role="img" aria-label="Edge node wiring: an Arduino UNO Q with a Dragonwing MPU and STM32 MCU, connected to an IMU and gas sensor over I2C, an IR-UWB radar over SPI, an LED indicator over GPIO, a BLE/Wi-Fi link to the phone, and a USB-C battery."><style>text{font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif}.t{font-size:14px;fill:#15181d}.ts{font-size:12px;fill:#5b6470}.th{font-size:14px;font-weight:600;fill:#15181d}</style><rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
        <defs>
          <marker id="ar2" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#8a94a0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
        </defs>
        <!-- connection lines (drawn first, under boxes) -->
        <line x1="210" y1="154" x2="278" y2="154" stroke="#8a94a0" stroke-width="1.2"/>
        <line x1="210" y1="226" x2="278" y2="226" stroke="#8a94a0" stroke-width="1.2"/>
        <line x1="210" y1="298" x2="278" y2="298" stroke="#8a94a0" stroke-width="1.2"/>
        <line x1="442" y1="126" x2="498" y2="126" stroke="#8a94a0" stroke-width="1.2"/>
        <line x1="442" y1="206" x2="498" y2="206" stroke="#8a94a0" stroke-width="1.2"/>
        <line x1="360" y1="330" x2="360" y2="360" stroke="#8a94a0" stroke-width="1.2"/>
        <text class="ts" x="244" y="144" text-anchor="middle">I²C</text>
        <text class="ts" x="244" y="216" text-anchor="middle">SPI</text>
        <text class="ts" x="244" y="288" text-anchor="middle">I²C</text>
        <text class="ts" x="470" y="116" text-anchor="middle">GPIO</text>
        <text class="ts" x="470" y="196" text-anchor="middle">radio</text>
        <text class="ts" x="392" y="346" text-anchor="start">USB-C</text>
        <!-- UNO Q outer -->
        <rect x="280" y="120" width="160" height="210" rx="12" fill="#fbe9df" stroke="#d6520e" stroke-width="1"/>
        <text class="th" x="360" y="138" text-anchor="middle" dominant-baseline="central">Arduino UNO Q</text>
        <rect x="292" y="152" width="136" height="68" rx="8" fill="#ffffff" stroke="#d6520e" stroke-width="0.8"/>
        <text class="th" x="360" y="176" text-anchor="middle" dominant-baseline="central">Dragonwing MPU</text>
        <text class="ts" x="360" y="194" text-anchor="middle" dominant-baseline="central">Linux + AI (CNN)</text>
        <rect x="292" y="238" width="136" height="68" rx="8" fill="#ffffff" stroke="#d6520e" stroke-width="0.8"/>
        <text class="th" x="360" y="262" text-anchor="middle" dominant-baseline="central">STM32 MCU</text>
        <text class="ts" x="360" y="280" text-anchor="middle" dominant-baseline="central">real-time capture</text>
        <!-- left sensors -->
        <rect x="60" y="128" width="150" height="52" rx="8" fill="#e9f0fb" stroke="#2f6db0" stroke-width="1"/>
        <text class="th" x="135" y="148" text-anchor="middle" dominant-baseline="central">IMU</text>
        <text class="ts" x="135" y="166" text-anchor="middle" dominant-baseline="central">accel + gyro</text>
        <rect x="60" y="200" width="150" height="52" rx="8" fill="#e9f0fb" stroke="#2f6db0" stroke-width="1"/>
        <text class="th" x="135" y="220" text-anchor="middle" dominant-baseline="central">IR-UWB radar</text>
        <text class="ts" x="135" y="238" text-anchor="middle" dominant-baseline="central">Novelda XeThru</text>
        <rect x="60" y="272" width="150" height="52" rx="8" fill="#e9f0fb" stroke="#2f6db0" stroke-width="1"/>
        <text class="th" x="135" y="292" text-anchor="middle" dominant-baseline="central">Gas + temp</text>
        <text class="ts" x="135" y="310" text-anchor="middle" dominant-baseline="central">CO · °C safety</text>
        <!-- right outputs -->
        <rect x="500" y="100" width="170" height="52" rx="8" fill="#f5f7f9" stroke="#8a94a0" stroke-width="1"/>
        <text class="th" x="585" y="120" text-anchor="middle" dominant-baseline="central">LED / buzzer</text>
        <text class="ts" x="585" y="138" text-anchor="middle" dominant-baseline="central">standalone alert</text>
        <rect x="500" y="180" width="170" height="52" rx="8" fill="#e3f3ee" stroke="#0f7a5f" stroke-width="1"/>
        <text class="th" x="585" y="200" text-anchor="middle" dominant-baseline="central">BLE / Wi-Fi Direct</text>
        <text class="ts" x="585" y="218" text-anchor="middle" dominant-baseline="central">→ firefighter phone</text>
        <!-- battery -->
        <rect x="300" y="362" width="120" height="44" rx="8" fill="#f5f7f9" stroke="#8a94a0" stroke-width="1"/>
        <text class="th" x="360" y="384" text-anchor="middle" dominant-baseline="central">Li-ion battery</text>
      </svg>
