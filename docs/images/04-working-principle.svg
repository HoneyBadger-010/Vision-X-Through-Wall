<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-label="The radar node emits UWB pulses that pass through a wall, reflect off a living person whose chest moves with breathing, and the chest motion over time becomes a breathing waveform giving a rate."><style>text{font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif}.t{font-size:14px;fill:#15181d}.ts{font-size:12px;fill:#5b6470}.th{font-size:14px;font-weight:600;fill:#15181d}</style><rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
        <defs>
          <marker id="ar4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#8a94a0" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
        </defs>
        <!-- node -->
        <rect x="40" y="110" width="130" height="64" rx="10" fill="#fbe9df" stroke="#d6520e" stroke-width="1"/>
        <text class="th" x="105" y="134" text-anchor="middle" dominant-baseline="central">UNO Q + radar</text>
        <text class="ts" x="105" y="152" text-anchor="middle" dominant-baseline="central">emits UWB pulses</text>
        <!-- emission arcs -->
        <path d="M180 130 Q198 142 180 154" fill="none" stroke="#d6520e" stroke-width="1.4"/>
        <path d="M188 124 Q212 142 188 160" fill="none" stroke="#d6520e" stroke-width="1.4"/>
        <path d="M196 118 Q226 142 196 166" fill="none" stroke="#d6520e" stroke-width="1.4"/>
        <!-- wall -->
        <rect x="290" y="74" width="14" height="150" fill="#d3d8de" stroke="#9aa3ad" stroke-width="1"/>
        <line x1="291" y1="92" x2="303" y2="80" stroke="#9aa3ad" stroke-width="0.8"/>
        <line x1="291" y1="120" x2="303" y2="108" stroke="#9aa3ad" stroke-width="0.8"/>
        <line x1="291" y1="148" x2="303" y2="136" stroke="#9aa3ad" stroke-width="0.8"/>
        <line x1="291" y1="176" x2="303" y2="164" stroke="#9aa3ad" stroke-width="0.8"/>
        <text class="ts" x="297" y="240" text-anchor="middle">wall / door</text>
        <!-- person -->
        <circle cx="392" cy="104" r="13" fill="#eef1f5" stroke="#15181d" stroke-width="1.5"/>
        <rect x="380" y="118" width="24" height="54" rx="10" fill="#eef1f5" stroke="#15181d" stroke-width="1.5"/>
        <line x1="388" y1="170" x2="384" y2="212" stroke="#15181d" stroke-width="2" stroke-linecap="round"/>
        <line x1="400" y1="170" x2="404" y2="212" stroke="#15181d" stroke-width="2" stroke-linecap="round"/>
        <line x1="380" y1="130" x2="366" y2="158" stroke="#15181d" stroke-width="2" stroke-linecap="round"/>
        <line x1="404" y1="130" x2="420" y2="158" stroke="#15181d" stroke-width="2" stroke-linecap="round"/>
        <line x1="372" y1="140" x2="360" y2="140" stroke="#0f7a5f" stroke-width="2" marker-start="url(#ar4)" marker-end="url(#ar4)"/>
        <text class="ts" x="392" y="240" text-anchor="middle">living person (breathing)</text>
        <!-- data arrow to waveform -->
        <line x1="408" y1="140" x2="516" y2="140" stroke="#8a94a0" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ar4)"/>
        <text class="ts" x="462" y="126" text-anchor="middle">chest motion over time</text>
        <!-- waveform -->
        <text class="th" x="600" y="96" text-anchor="middle" dominant-baseline="central">what the radar sees</text>
        <path d="M524 140 Q546 114 568 140 Q590 166 612 140 Q634 114 656 140 Q668 128 676 134" fill="none" stroke="#0f7a5f" stroke-width="2"/>
        <text class="th" x="600" y="196" text-anchor="middle" dominant-baseline="central">≈ 14 breaths / min</text>
      <!-- vision-x figure --></svg>
